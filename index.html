<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Resume Tailor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: 'DM Mono', monospace;
      padding: 40px 24px;
    }

    .header { text-align: center; margin-bottom: 52px; }

    .badge {
      display: inline-block;
      background: rgba(100,255,180,0.08);
      border: 1px solid rgba(100,255,180,0.25);
      color: #64ffb4;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, #64ffb4 60%, #00bfff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .subtitle { color: #666680; font-size: 13px; letter-spacing: 1px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto 24px;
    }

    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.2s;
    }

    .panel:hover { border-color: rgba(100,255,180,0.2); }

    .panel-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #64ffb4;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-label::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: #64ffb4;
      border-radius: 50%;
    }

    .upload-zone {
      border: 1.5px dashed rgba(100,255,180,0.3);
      border-radius: 8px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(100,255,180,0.02);
      display: block;
    }

    .upload-zone:hover, .upload-zone.drag {
      border-color: rgba(100,255,180,0.7);
      background: rgba(100,255,180,0.05);
    }

    .upload-icon { font-size: 32px; margin-bottom: 10px; }

    .upload-text { color: #888; font-size: 12px; line-height: 1.6; }
    .upload-text strong { color: #64ffb4; }

    #file-input { display: none; }

    .file-ready {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(100,255,180,0.07);
      border: 1px solid rgba(100,255,180,0.3);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .file-icon { font-size: 24px; }
    .file-name { font-size: 12px; color: #64ffb4; word-break: break-all; }
    .file-size { font-size: 11px; color: #555; margin-top: 2px; }

    .remove-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s;
    }

    .remove-btn:hover { color: #ff6b6b; }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #c8c8d8;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      padding: 14px;
      resize: vertical;
      min-height: 180px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: rgba(100,255,180,0.4); }
    textarea::placeholder { color: #444; }

    .char-count { text-align: right; font-size: 10px; color: #444; margin-top: 6px; }

    .action-row {
      max-width: 1000px;
      margin: 0 auto 32px;
    }

    .btn-main {
      width: 100%;
      background: linear-gradient(135deg, #64ffb4, #00bfff);
      border: none;
      border-radius: 8px;
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      padding: 16px 32px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-transform: uppercase;
    }

    .btn-main:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-main:disabled { opacity: 0.35; cursor: not-allowed; }

    .loading-bar {
      max-width: 1000px;
      margin: 0 auto 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      height: 3px;
      overflow: hidden;
      display: none;
    }

    .loading-bar.active { display: block; }

    .loading-fill {
      height: 100%;
      background: linear-gradient(90deg, #64ffb4, #00bfff);
      border-radius: 4px;
      animation: loading 1.4s ease-in-out infinite;
    }

    @keyframes loading {
      0% { width: 0%; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    .status-text {
      max-width: 1000px;
      margin: 0 auto 24px;
      font-size: 11px;
      color: #64ffb4;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
      display: none;
    }

    .status-text.active { display: block; }

    .result-panel {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(100,255,180,0.2);
      border-radius: 12px;
      overflow: hidden;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .result-panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      background: rgba(100,255,180,0.06);
      border-bottom: 1px solid rgba(100,255,180,0.15);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #64ffb4;
    }

    .download-btn {
      background: linear-gradient(135deg, #64ffb4, #00bfff);
      border: none;
      border-radius: 6px;
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 20px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .download-btn:hover { opacity: 0.85; }

    .result-content {
      padding: 28px;
      font-size: 13px;
      line-height: 1.9;
      color: #c8c8d8;
      white-space: pre-wrap;
      max-height: 500px;
      overflow-y: auto;
    }

    .result-content::-webkit-scrollbar { width: 4px; }
    .result-content::-webkit-scrollbar-thumb { background: rgba(100,255,180,0.2); border-radius: 2px; }

    .error-box {
      max-width: 1000px;
      margin: 0 auto 16px;
      background: rgba(255,80,80,0.07);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 8px;
      padding: 16px 20px;
      color: #ff8888;
      font-size: 12px;
      display: none;
    }

    .error-box.active { display: block; }

    /* API Key section */
    .api-section {
      max-width: 1000px;
      margin: 0 auto 24px;
      background: rgba(255,200,50,0.05);
      border: 1px solid rgba(255,200,50,0.2);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .api-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffc832;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-label::before {
      content: '🔑';
      font-size: 14px;
    }

    .api-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,200,50,0.2);
      border-radius: 8px;
      color: #c8c8d8;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-input:focus { border-color: rgba(255,200,50,0.5); }
    .api-input::placeholder { color: #444; }

    .api-note {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      line-height: 1.5;
    }

    .api-note a { color: #ffc832; text-decoration: none; }
    .api-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge">✦ AI Powered</div>
    <h1>Resume Tailor</h1>
    <p class="subtitle">Upload your resume · Paste job description · Get tailored instantly</p>
  </div>

  <!-- API Key Section -->
  <div class="api-section">
    <div class="api-label">Anthropic API Key</div>
    <input type="password" class="api-input" id="api-key" placeholder="sk-ant-api03-..." />
    <p class="api-note">
      Your key is never stored or sent anywhere except directly to Anthropic's API. 
      Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </p>
  </div>

  <div class="grid">
    <!-- Upload Panel -->
    <div class="panel">
      <div class="panel-label">Resume Upload</div>
      <div id="upload-area">
        <label
          id="upload-zone"
          for="file-input"
          class="upload-zone"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave()"
          ondrop="handleDrop(event)"
        >
          <div class="upload-icon">📄</div>
          <div class="upload-text">
            <strong>Click to upload</strong> or drag & drop<br/>
            Supports .docx and .txt files
          </div>
        </label>
        <input type="file" id="file-input" accept=".docx,.doc,.txt" onchange="handleFileChange(event)" />
      </div>
      <div id="file-ready" class="file-ready" style="display:none;">
        <div class="file-icon">📝</div>
        <div>
          <div class="file-name" id="file-name-text"></div>
          <div class="file-size" id="file-size-text"></div>
        </div>
        <button class="remove-btn" onclick="removeFile()">✕</button>
      </div>
    </div>

    <!-- Job Description Panel -->
    <div class="panel">
      <div class="panel-label">Job Description</div>
      <textarea
        id="job-desc"
        placeholder="Paste the job description here...&#10;&#10;Include the full description with requirements, responsibilities, and skills needed."
        oninput="updateCharCount()"
        rows="7"
      ></textarea>
      <div class="char-count" id="char-count">0 chars</div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-main" id="tailor-btn" onclick="handleTailor()" disabled>✦ Tailor My Resume</button>
  </div>

  <div class="loading-bar" id="loading-bar"><div class="loading-fill"></div></div>
  <div class="status-text" id="status-text"></div>
  <div class="error-box" id="error-box"></div>

  <div class="result-panel" id="result-panel">
    <div class="result-header">
      <div class="result-title">✦ Tailored Resume Ready</div>
      <button class="download-btn" onclick="handleDownload()">↓ Download .txt</button>
    </div>
    <div class="result-content" id="result-content"></div>
  </div>

  <script>
    let currentFile = null;
    let currentFileText = "";
    let resultText = "";

    function formatBytes(n) {
      return n < 1024 ? n + " B" : (n / 1024).toFixed(1) + " KB";
    }

    function updateCharCount() {
      const val = document.getElementById('job-desc').value;
      document.getElementById('char-count').textContent = val.length + ' chars';
      checkReady();
    }

    function checkReady() {
      const apiKey = document.getElementById('api-key').value.trim();
      const jobDesc = document.getElementById('job-desc').value.trim();
      const ready = currentFile && jobDesc.length > 30 && apiKey.startsWith('sk-');
      document.getElementById('tailor-btn').disabled = !ready;
    }

    document.getElementById('api-key').addEventListener('input', checkReady);

    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById('upload-zone').classList.add('drag');
    }

    function handleDragLeave() {
      document.getElementById('upload-zone').classList.remove('drag');
    }

    function handleDrop(e) {
      e.preventDefault();
      handleDragLeave();
      const f = e.dataTransfer.files[0];
      if (f) processFile(f);
    }

    function handleFileChange(e) {
      const f = e.target.files[0];
      if (f) processFile(f);
    }

    function processFile(f) {
      const ext = f.name.split('.').pop().toLowerCase();
      if (!['docx', 'doc', 'txt'].includes(ext)) {
        showError('Please upload a .docx or .txt file.');
        return;
      }
      clearError();
      currentFile = f;

      if (ext === 'txt') {
        const reader = new FileReader();
        reader.onload = (e) => { currentFileText = e.target.result; };
        reader.readAsText(f);
      } else {
        currentFileText = '__DOCX__';
      }

      document.getElementById('upload-area').style.display = 'none';
      document.getElementById('file-ready').style.display = 'flex';
      document.getElementById('file-name-text').textContent = f.name;
      document.getElementById('file-size-text').textContent = formatBytes(f.size);
      checkReady();
    }

    function removeFile() {
      currentFile = null;
      currentFileText = "";
      document.getElementById('upload-area').style.display = 'block';
      document.getElementById('file-ready').style.display = 'none';
      document.getElementById('file-input').value = '';
      document.getElementById('result-panel').classList.remove('active');
      checkReady();
    }

    function setLoading(on, msg) {
      document.getElementById('loading-bar').classList.toggle('active', on);
      const st = document.getElementById('status-text');
      st.classList.toggle('active', on);
      st.textContent = msg || '';
      document.getElementById('tailor-btn').disabled = on;
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = '⚠ ' + msg;
      el.classList.add('active');
    }

    function clearError() {
      document.getElementById('error-box').classList.remove('active');
    }

    async function handleTailor() {
      const apiKey = document.getElementById('api-key').value.trim();
      const jobDesc = document.getElementById('job-desc').value.trim();

      if (!currentFile || !jobDesc || !apiKey) return;

      clearError();
      setLoading(true, 'Reading your resume...');
      document.getElementById('result-panel').classList.remove('active');

      try {
        let messages;
        const ext = currentFile.name.split('.').pop().toLowerCase();

        if (ext === 'docx' || ext === 'doc') {
          // Read as base64
          const base64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(',')[1]);
            r.onerror = () => rej(new Error('File read failed'));
            r.readAsDataURL(currentFile);
          });

          setLoading(true, 'Analyzing job description...');

          messages = [{
            role: 'user',
            content: [
              {
                type: 'document',
                source: {
                  type: 'base64',
                  media_type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                  data: base64
                }
              },
              {
                type: 'text',
                text: `You are an expert resume writer. I have uploaded my resume as a Word document.

Job Description:
---
${jobDesc}
---

Please tailor my resume specifically for this job. Add relevant keywords, highlight matching skills, and make it ATS-friendly. Return ONLY the complete tailored resume text with clear section headings like:
[NAME & CONTACT]
[PROFESSIONAL SUMMARY]
[SKILLS]
[EXPERIENCE]
[EDUCATION]`
              }
            ]
          }];
        } else {
          messages = [{
            role: 'user',
            content: `You are an expert resume writer. Here is my current resume:

---RESUME---
${currentFileText}
---END---

Job Description:
---
${jobDesc}
---

Please tailor my resume specifically for this job. Add relevant keywords, highlight matching skills, and make it ATS-friendly. Return ONLY the complete tailored resume text with clear section headings like:
[NAME & CONTACT]
[PROFESSIONAL SUMMARY]
[SKILLS]
[EXPERIENCE]
[EDUCATION]`
          }];
        }

        setLoading(true, 'AI is tailoring your resume...');

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 2048,
            messages
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        resultText = data.content?.map(b => b.text || '').join('') || '';
        document.getElementById('result-content').textContent = resultText;
        document.getElementById('result-panel').classList.add('active');
        setLoading(false);

      } catch (err) {
        showError('Something went wrong: ' + err.message);
        setLoading(false);
      }
    }

    function handleDownload() {
      if (!resultText) return;
      const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tailored_resume.txt';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
